name: untitled
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.2
  cupertino_icons: ^1.0.2
  flutter_secure_storage: ^9.0.0
  image_picker: ^1.0.4
  flutter_iconpicker: ^3.1.0
  carousel_slider: ^4.2.1  # Add this for better image galleries
  url_launcher: ^6.1.11
  path_provider: ^2.1.1       # For getting local file paths
  hive: ^2.2.3                # For local database (optional but recommended)
  hive_flutter: ^1.1.0
  graphql_flutter: ^5.1.0
  http: ^1.1.0
  dio: ^5.3.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/logo.jpg
    - assets/splash_image.jpg